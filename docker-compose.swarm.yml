services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: bgmon
      POSTGRES_USER: bgmon
      POSTGRES_PASSWORD: ${BGMON_DB_PASSWORD:-bgmon}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - bgmon
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.bgmon.db == true
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bgmon -d bgmon"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    image: ${BGMON_IMAGE:-bgmon:latest}
    environment:
      BGMON_SECRET_KEY: ${BGMON_SECRET_KEY}
      BGMON_DATABASE_URL: ${BGMON_DATABASE_URL}
      BGMON_PUBLIC_BASE_URL: ${BGMON_PUBLIC_BASE_URL}
      BGMON_INFLUXDB_URL: ${BGMON_INFLUXDB_URL:-}
      BGMON_INFLUXDB_TOKEN: ${BGMON_INFLUXDB_TOKEN:-}
      BGMON_INFLUXDB_ORG: ${BGMON_INFLUXDB_ORG:-familie-heise.de}
      BGMON_INFLUXDB_BUCKET: ${BGMON_INFLUXDB_BUCKET:-gluroo}
      BGMON_LIBRE_EMAIL: ${BGMON_LIBRE_EMAIL:-}
      BGMON_LIBRE_PASSWORD: ${BGMON_LIBRE_PASSWORD:-}
      BGMON_LIBRE_REGION: ${BGMON_LIBRE_REGION:-EU2}
      BGMON_TWILIO_ACCOUNT_SID: ${BGMON_TWILIO_ACCOUNT_SID:-}
      BGMON_TWILIO_AUTH_TOKEN: ${BGMON_TWILIO_AUTH_TOKEN:-}
      BGMON_TWILIO_FROM_NUMBER: ${BGMON_TWILIO_FROM_NUMBER:-}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      BGMON_BOOTSTRAP_ADMIN_EMAIL: ${BGMON_BOOTSTRAP_ADMIN_EMAIL}
      BGMON_BOOTSTRAP_ADMIN_PASSWORD: ${BGMON_BOOTSTRAP_ADMIN_PASSWORD}
      BGMON_LEASE_TTL_S: "30"
      BGMON_LEADER_RENEW_S: "10"
    networks:
      - bgmon
    deploy:
      replicas: 3
      update_config:
        parallelism: 1
        delay: 30s
        failure_action: rollback
        order: start-first
      rollback_config:
        parallelism: 1
        delay: 10s
      restart_policy:
        condition: any
        delay: 10s
        max_attempts: 5
      placement:
        constraints:
          - node.labels.bgmon.app == true
    stop_grace_period: 60s

  # Optional: Traefik reverse proxy for HTTPS and load balancing
  traefik:
    image: traefik:v3.0
    command:
      - --api.insecure=true
      - --providers.docker.swarmMode=true
      - --providers.docker.network=bgmon_bgmon
      - --providers.docker.exposedByDefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --certificatesresolvers.letsencrypt.acme.tlschallenge=true
      - --certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL:-admin@example.com}
      - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik-certs:/letsencrypt
    networks:
      - bgmon
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
    labels:
      - "traefik.enable=true"

volumes:
  pgdata:
  traefik-certs:

networks:
  bgmon:
    driver: overlay
    attachable: true
