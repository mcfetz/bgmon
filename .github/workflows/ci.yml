name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: bgmon_test
          POSTGRES_USER: bgmon
          POSTGRES_PASSWORD: bgmon
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install backend dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint backend
        working-directory: ./backend
        run: ruff check .

      - name: Type-check backend
        working-directory: ./backend
        run: ty check bgmon_api

      - name: Run database migrations
        working-directory: ./backend
        env:
          BGMON_DATABASE_URL: postgresql://bgmon:bgmon@localhost:5432/bgmon_test
          BGMON_SECRET_KEY: test-secret
        run: flask --app bgmon_api.app db upgrade

      - name: Run backend tests
        working-directory: ./backend
        env:
          BGMON_DATABASE_URL: postgresql://bgmon:bgmon@localhost:5432/bgmon_test
          BGMON_SECRET_KEY: test-secret
        run: pytest --cov=bgmon_api --cov-report=term-missing

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Lint frontend
        working-directory: ./frontend
        run: npm run lint

      - name: Sync SvelteKit
        working-directory: ./frontend
        run: npx svelte-kit sync

      - name: Type-check frontend
        working-directory: ./frontend
        run: npm run check

      - name: Run frontend tests
        working-directory: ./frontend
        run: npm run test

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: bgmon:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
